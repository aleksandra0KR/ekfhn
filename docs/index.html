<!DOCTYPE html>
<html lang="ru">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NabokaDEX — Liquidity Pool</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stellar SDK -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/12.3.0/stellar-sdk.min.js" resource="unsafe-inline"  nonce="EDNef03nceIOfn39fn3e9h3sdfa"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/6.0.1/index.min.js"></script>
  <script type="importmap" nonce="EDNnf03nceIOfn39fn3e9h3sdfa">

        "@stellar/freighter-api": "https://unpkg.com/@stellar/freighter-api@latest/build/index.min.js"

  <style>
    :root {
      --bg-primary:   #0a0b0f;
      --bg-card:      #12131a;
      --bg-card-hover:#1a1b25;
      --bg-input:     #1e1f2b;
      --border:       #2a2b3d;
      --border-glow:  #6366f140;
      --accent:       #818cf8;
      --accent-bright:#a5b4fc;
      --accent-dim:   #4f46e5;
      --green:        #34d399;
      --green-dim:    #059669;
      --red:          #f87171;
      --red-dim:      #dc2626;
      --orange:       #fb923c;
      --text-primary: #e2e8f0;
      --text-secondary:#94a3b8;
      --text-muted:   #64748b;
      --font-body:    'Outfit', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --radius:       12px;
      --radius-sm:    8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Grain overlay ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── Gradient orbs ─── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; right: -100px; }
    .orb-3 { width: 300px; height: 300px; background: #8b5cf6; top: 50%; left: 60%; }

    /* ─── Layout ─── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ─── Header ─── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }

    .connect-btn {
      font-family: var(--font-body);
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 999px;
      border: 1px solid var(--accent-dim);
      background: linear-gradient(135deg, var(--accent-dim), #7c3aed);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .connect-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #6366f140; }
    .connect-btn.connected {
      background: var(--bg-card);
      border-color: var(--green-dim);
      color: var(--green);
    }

    /* ─── Status Bar ─── */
    .status-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border-glow); }
    .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-value.accent { color: var(--accent-bright); }
    .stat-value.green  { color: var(--green); }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-secondary);
      transition: all 0.2s;
      border: none;
      background: none;
      font-family: var(--font-body);
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active {
      background: var(--accent-dim);
      color: white;
      box-shadow: 0 2px 10px #6366f130;
    }

    /* ─── Panels ─── */
    .panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 520px;
      margin: 0 auto;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* ─── Form Controls ─── */
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--border-glow);
    }
    .field input::placeholder {
      color: var(--text-muted);
    }
    .field .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent-dim), #7c3aed);
      color: white;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .action-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 24px #6366f140; }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .action-btn.green-btn {
      background: linear-gradient(135deg, var(--green-dim), #10b981);
    }
    .action-btn.red-btn {
      background: linear-gradient(135deg, var(--red-dim), #ef4444);
    }

    /* ─── Swap Arrow ─── */
    .swap-arrow {
      display: flex;
      justify-content: center;
      margin: 8px 0;
    }
    .swap-arrow button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg-input);
      color: var(--accent);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .swap-arrow button:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: white;
    }

    /* ─── Quote display ─── */
    .quote-box {
      background: var(--bg-input);
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin: 12px 0;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .quote-box .amount {
      color: var(--green);
      font-weight: 600;
    }

    /* ─── Log ─── */
    .log-area {
      margin-top: 32px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .log-area h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    #log {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      max-height: 200px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    #log .success { color: var(--green); }
    #log .error { color: var(--red); }
    #log .info { color: var(--accent-bright); }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .status-bar { grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 1.1rem; }
      header { flex-wrap: wrap; gap: 12px; }
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="container">
    <!-- ═══ Header ═══ -->
    <header>
      <div class="logo">Naboka<span>DEX</span></div>
      <button class="connect-btn" id="connectBtn" onclick="connectWallet()">
        Подключить Freighter
      </button>
    </header>

    <!-- ═══ Stats ═══ -->
    <div class="status-bar">
      <div class="stat-card">
        <div class="stat-label">Ваш баланс NT</div>
        <div class="stat-value accent" id="balanceA">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ваш баланс XLM</div>
        <div class="stat-value" id="balanceB">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">LP-токены</div>
        <div class="stat-value green" id="balanceLP">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Резерв пула (NT / XLM)</div>
        <div class="stat-value" id="reserves">— / —</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Всего свопов</div>
        <div class="stat-value" id="totalSwaps">—</div>
      </div>
    </div>

    <!-- ═══ Tabs ═══ -->
    <div class="tabs">
      <button class="tab active" data-panel="swap">Swap</button>
      <button class="tab" data-panel="liquidity">Ликвидность</button>
      <button class="tab" data-panel="transfer">Перевод</button>
    </div>

    <!-- ═══ Swap Panel ═══ -->
    <div class="panel active" id="panel-swap">
      <div class="card">
        <div class="card-title">Обмен токенов</div>
        <div class="field">
          <label>Вы отдаёте</label>
          <select id="swapFrom" onchange="updateQuote()">
            <option value="A">NT (NabokaToken)</option>
            <option value="B">XLM</option>
          </select>
        </div>
        <div class="field">
          <label>Сумма</label>
          <input type="number" id="swapAmountIn" placeholder="0.0" min="0" step="any" oninput="updateQuote()" />
        </div>

        <div class="swap-arrow">
          <button onclick="flipSwap()" title="Поменять направление">⇅</button>
        </div>

        <div class="field">
          <label>Вы получите (примерно)</label>
          <div class="quote-box">
            ≈ <span class="amount" id="quoteOut">0</span> <span id="quoteSymbol">XLM</span>
          </div>
        </div>

        <div class="field">
          <label>Мин. получить (slippage)</label>
          <input type="number" id="swapMinOut" placeholder="0" min="0" step="any" />
        </div>

        <button class="action-btn" onclick="doSwap()" id="swapBtn" disabled>Swap</button>
      </div>
    </div>

    <!-- ═══ Liquidity Panel ═══ -->
    <div class="panel" id="panel-liquidity">
      <div class="card">
        <div class="card-title">Управление ликвидностью</div>

        <div class="field">
          <label>Внести NT</label>
          <input type="number" id="liqAmountA" placeholder="0.0" min="0" step="any" />
        </div>
        <div class="field">
          <label>Внести XLM</label>
          <input type="number" id="liqAmountB" placeholder="0.0" min="0" step="any" />
        </div>
        <button class="action-btn green-btn" onclick="addLiquidity()">Добавить ликвидность</button>

        <hr style="border:none;border-top:1px solid var(--border);margin:24px 0" />

        <div class="field">
          <label>Вывести LP-токенов</label>
          <input type="number" id="removeLpAmount" placeholder="0.0" min="0" step="any" />
        </div>
        <button class="action-btn red-btn" onclick="removeLiquidity()">Вывести ликвидность</button>
      </div>
    </div>

    <!-- ═══ Transfer Panel ═══ -->
    <div class="panel" id="panel-transfer">
      <div class="card">
        <div class="card-title">Перевод NT токенов</div>
        <div class="field">
          <label>Адрес получателя (Stellar)</label>
          <input type="text" id="transferTo" placeholder="G... или C..." />
        </div>
        <div class="field">
          <label>Сумма NT</label>
          <input type="number" id="transferAmount" placeholder="0.0" min="0" step="any" />
        </div>
        <button class="action-btn" onclick="doTransfer()">Отправить</button>
      </div>
    </div>

    <!-- ═══ Log ═══ -->
    <div class="log-area">
      <h3>Журнал операций</h3>
      <div id="log"></div>
    </div>
  </div>

  <script nonce="EDNnf03ncetyOfn39fn3e9h3sdfa">
    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  КОНФИГУРАЦИЯ — замените после деплоя контрактов             ║
    // ╚═══════════════════════════════════════════════════════════════╝

    const CONFIG = {
      // Сеть: 'testnet' или 'public'
      network: 'testnet',
      networkPassphrase: 'Test SDF Network ; September 2015',
      rpcUrl: 'https://soroban-testnet.stellar.org',

      // Адреса контрактов (заполните после деплоя!)
      tokenA:  'CC4TFKCTIQ7Y7YRQH5VS5UIQCTERPQ67UWQPCLUJOAW7FVBG5ZPGPUUM', // NabokaToken
      tokenB:  'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC', // Native XLM (SAC)
      lpToken: 'CBL3VXR6B32KCMY3HQV4XBP3SLYQHYCHZMQMBHLNJZF7NQ3FTUKSA3JJ', // LP Token
      pool:    'CAC3VL5Y3ZRM4I3FUOUQIHAK6QPRAE37ELQHWRILRXG6ZMSHPR4DR3F5', // Liquidity Pool

      // Количество десятичных знаков токенов
      decimalsA: 7,
      decimalsB: 7,
      decimalsLP: 7,
    };

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  СОСТОЯНИЕ ПРИЛОЖЕНИЯ                                        ║
    // ╚═══════════════════════════════════════════════════════════════╝

    let userAddress = null;
    let server = null;

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  ИНИЦИАЛИЗАЦИЯ                                               ║
    // ╚═══════════════════════════════════════════════════════════════╝

    function init() {
      server = new StellarSdk.SorobanRpc.Server(CONFIG.rpcUrl);
      setupTabs();
      log('info', 'Приложение загружено. Подключите кошелёк Freighter.');
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  КОШЕЛЁК  (Freighter)                                        ║
    // ╚═══════════════════════════════════════════════════════════════╝

    async function connectWallet() {
      try {
        if (!window.freighterApi) {
          log('error', 'Freighter не найден');
          alert('Установите Freighter!');
          return;
        }

        const freighter = window.freighterApi;

        // 🔥 ВАЖНО: запрос доступа
        await freighter.requestAccess();

        const address = await freighter.getAddress();

        if (!address) {
          log('error', 'Не удалось получить адрес');
          return;
        }

        userAddress = address;

        const short = address.slice(0, 6) + '…' + address.slice(-4);

        document.getElementById('connectBtn').textContent = short;
        document.getElementById('connectBtn').classList.add('connected');
        document.getElementById('swapBtn').disabled = false;

        log('success', `Кошелёк подключён: ${short}`);

        await refreshBalances();

      } catch (err) {
        log('error', `Ошибка подключения: ${err.message || err}`);
      }
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  ЧТЕНИЕ БАЛАНСОВ И СОСТОЯНИЯ ПУЛА                            ║
    // ╚═══════════════════════════════════════════════════════════════╝

    function toUnits(raw, decimals) {
      if (raw == null) return '—';
      const num = Number(raw) / Math.pow(10, decimals);
      return num.toLocaleString('ru-RU', { maximumFractionDigits: decimals });
    }

    async function callContract(contractId, method, args = []) {
      const contract = new StellarSdk.Contract(contractId);
      const account = await server.getAccount(userAddress);
      const tx = new StellarSdk.TransactionBuilder(account, {
        fee: '100',
        networkPassphrase: CONFIG.networkPassphrase,
      })
        .addOperation(contract.call(method, ...args))
        .setTimeout(30)
        .build();

      const sim = await server.simulateTransaction(tx);
      if (StellarSdk.SorobanRpc.Api.isSimulationError(sim)) {
        throw new Error(sim.error || 'simulation failed');
      }
      return sim.result?.retval;
    }

    async function refreshBalances() {
      if (!userAddress) return;
      try {
        const addr = new StellarSdk.Address(userAddress);
        const addrScVal = addr.toScVal();

        // Баланс токена A
        const balA = await callContract(CONFIG.tokenA, 'balance', [addrScVal]);
        document.getElementById('balanceA').textContent =
          toUnits(StellarSdk.scValToNative(balA), CONFIG.decimalsA);

        // Баланс токена B (XLM через SAC)
        try {
          const balB = await callContract(CONFIG.tokenB, 'balance', [addrScVal]);
          document.getElementById('balanceB').textContent =
            toUnits(StellarSdk.scValToNative(balB), CONFIG.decimalsB);
        } catch {
          // Если SAC не развёрнут, показываем нативный баланс
          const acct = await server.getAccount(userAddress);
          const native = acct.balances?.find(b => b.asset_type === 'native');
          document.getElementById('balanceB').textContent = native ? Number(native.balance).toFixed(2) : '—';
        }

        // LP-баланс
        const balLP = await callContract(CONFIG.lpToken, 'balance', [addrScVal]);
        document.getElementById('balanceLP').textContent =
          toUnits(StellarSdk.scValToNative(balLP), CONFIG.decimalsLP);

        // Резервы пула
        const reserves = await callContract(CONFIG.pool, 'get_reserves', []);
        if (reserves) {
          const [rA, rB] = StellarSdk.scValToNative(reserves);
          document.getElementById('reserves').textContent =
            `${toUnits(rA, CONFIG.decimalsA)} / ${toUnits(rB, CONFIG.decimalsB)}`;
        }

        // Общее число свопов
        const swaps = await callContract(CONFIG.pool, 'total_swaps', []);
        document.getElementById('totalSwaps').textContent =
          swaps != null ? StellarSdk.scValToNative(swaps) : '—';
      } catch (err) {
        log('error', `Не удалось обновить балансы: ${err.message}`);
      }
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  ПОДПИСАНИЕ И ОТПРАВКА ТРАНЗАКЦИЙ                            ║
    // ╚═══════════════════════════════════════════════════════════════╝

    async function signAndSend(contractId, method, args = []) {
      const contract = new StellarSdk.Contract(contractId);
      const account = await server.getAccount(userAddress);
      let tx = new StellarSdk.TransactionBuilder(account, {
        fee: '10000000',
        networkPassphrase: CONFIG.networkPassphrase,
      })
        .addOperation(contract.call(method, ...args))
        .setTimeout(60)
        .build();

      // Симуляция
      const sim = await server.simulateTransaction(tx);
      if (StellarSdk.SorobanRpc.Api.isSimulationError(sim)) {
        throw new Error(sim.error || 'Simulation failed');
      }
      tx = StellarSdk.SorobanRpc.assembleTransaction(tx, sim).build();

      // Подпись через Freighter
      const { signedTxXdr } = await window.freighterApi.signTransaction(
        tx.toXDR(),
        { networkPassphrase: CONFIG.networkPassphrase }
      );
      const signed = StellarSdk.TransactionBuilder.fromXDR(
        signedTxXdr,
        CONFIG.networkPassphrase
      );

      // Отправка
      const response = await server.sendTransaction(signed);
      if (response.status === 'ERROR') {
        throw new Error('Transaction submission failed');
      }

      // Ожидание подтверждения
      let result;
      const start = Date.now();
      while (Date.now() - start < 30000) {
        result = await server.getTransaction(response.hash);
        if (result.status === 'SUCCESS') return result;
        if (result.status === 'FAILED') throw new Error('Transaction failed on-chain');
        await new Promise(r => setTimeout(r, 2000));
      }
      throw new Error('Transaction timeout');
    }

    function toAmount(val, decimals) {
      return BigInt(Math.round(parseFloat(val) * Math.pow(10, decimals)));
    }

    function i128ScVal(val) {
      return StellarSdk.nativeToScVal(val, { type: 'i128' });
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  SWAP                                                        ║
    // ╚═══════════════════════════════════════════════════════════════╝

    async function updateQuote() {
      const amountRaw = document.getElementById('swapAmountIn').value;
      if (!amountRaw || parseFloat(amountRaw) <= 0 || !userAddress) {
        document.getElementById('quoteOut').textContent = '0';
        return;
      }
      const dir = document.getElementById('swapFrom').value;
      const decIn  = dir === 'A' ? CONFIG.decimalsA : CONFIG.decimalsB;
      const decOut = dir === 'A' ? CONFIG.decimalsB : CONFIG.decimalsA;
      const method = dir === 'A' ? 'quote_a_to_b' : 'quote_b_to_a';

      try {
        const amt = toAmount(amountRaw, decIn);
        const result = await callContract(CONFIG.pool, method, [i128ScVal(amt)]);
        const out = StellarSdk.scValToNative(result);
        document.getElementById('quoteOut').textContent = toUnits(out, decOut);
      } catch {
        document.getElementById('quoteOut').textContent = '?';
      }
      document.getElementById('quoteSymbol').textContent = dir === 'A' ? 'XLM' : 'NT';
    }

    function flipSwap() {
      const sel = document.getElementById('swapFrom');
      sel.value = sel.value === 'A' ? 'B' : 'A';
      updateQuote();
    }

    async function doSwap() {
      if (!userAddress) return;
      const dir = document.getElementById('swapFrom').value;
      const amountRaw = document.getElementById('swapAmountIn').value;
      const minOutRaw = document.getElementById('swapMinOut').value || '0';
      if (!amountRaw || parseFloat(amountRaw) <= 0) return;

      const decIn  = dir === 'A' ? CONFIG.decimalsA : CONFIG.decimalsB;
      const decOut = dir === 'A' ? CONFIG.decimalsB : CONFIG.decimalsA;
      const method = dir === 'A' ? 'swap_a_to_b' : 'swap_b_to_a';
      const amt    = toAmount(amountRaw, decIn);
      const minOut = toAmount(minOutRaw, decOut);
      const addr   = new StellarSdk.Address(userAddress).toScVal();

      try {
        log('info', `Swap: отдаём ${amountRaw} ${dir === 'A' ? 'NT' : 'XLM'}…`);
        await signAndSend(CONFIG.pool, method, [addr, i128ScVal(amt), i128ScVal(minOut)]);
        log('success', 'Swap выполнен!');
        await refreshBalances();
      } catch (err) {
        log('error', `Swap ошибка: ${err.message}`);
      }
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  ЛИКВИДНОСТЬ                                                 ║
    // ╚═══════════════════════════════════════════════════════════════╝

    async function addLiquidity() {
      if (!userAddress) return;
      const aRaw = document.getElementById('liqAmountA').value;
      const bRaw = document.getElementById('liqAmountB').value;
      if (!aRaw || !bRaw || parseFloat(aRaw) <= 0 || parseFloat(bRaw) <= 0) return;

      const amtA = toAmount(aRaw, CONFIG.decimalsA);
      const amtB = toAmount(bRaw, CONFIG.decimalsB);
      const addr = new StellarSdk.Address(userAddress).toScVal();

      try {
        log('info', `Добавляем ликвидность: ${aRaw} NT + ${bRaw} XLM…`);
        await signAndSend(CONFIG.pool, 'add_liquidity', [addr, i128ScVal(amtA), i128ScVal(amtB)]);
        log('success', 'Ликвидность добавлена!');
        await refreshBalances();
      } catch (err) {
        log('error', `Ошибка: ${err.message}`);
      }
    }

    async function removeLiquidity() {
      if (!userAddress) return;
      const lpRaw = document.getElementById('removeLpAmount').value;
      if (!lpRaw || parseFloat(lpRaw) <= 0) return;

      const lpAmt = toAmount(lpRaw, CONFIG.decimalsLP);
      const addr  = new StellarSdk.Address(userAddress).toScVal();

      try {
        log('info', `Выводим ${lpRaw} LP-токенов…`);
        await signAndSend(CONFIG.pool, 'remove_liquidity', [addr, i128ScVal(lpAmt)]);
        log('success', 'Ликвидность выведена!');
        await refreshBalances();
      } catch (err) {
        log('error', `Ошибка: ${err.message}`);
      }
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  ПЕРЕВОД ТОКЕНОВ                                             ║
    // ╚═══════════════════════════════════════════════════════════════╝

    async function doTransfer() {
      if (!userAddress) return;
      const to     = document.getElementById('transferTo').value.trim();
      const amtRaw = document.getElementById('transferAmount').value;
      if (!to || !amtRaw || parseFloat(amtRaw) <= 0) return;

      const from  = new StellarSdk.Address(userAddress).toScVal();
      const toVal = new StellarSdk.Address(to).toScVal();
      const amt   = toAmount(amtRaw, CONFIG.decimalsA);

      try {
        log('info', `Перевод ${amtRaw} NT → ${to.slice(0,8)}…`);
        await signAndSend(CONFIG.tokenA, 'transfer', [from, toVal, i128ScVal(amt)]);
        log('success', 'Перевод выполнен!');
        await refreshBalances();
      } catch (err) {
        log('error', `Перевод ошибка: ${err.message}`);
      }
    }

    // ╔═══════════════════════════════════════════════════════════════╗
    // ║  UI HELPERS                                                   ║
    // ╚═══════════════════════════════════════════════════════════════╝

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
        });
      });
    }

    function log(type, msg) {
      const el = document.getElementById('log');
      const ts = new Date().toLocaleTimeString('ru-RU');
      el.innerHTML += `<div class="${type}">[${ts}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    // Запуск
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

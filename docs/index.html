      .status-bar { grid-template-columns: 1fr 1fr; }

  </style>

<body>
<div class="orb orb-1"></div>

<div class="container">
  <header>
    <div class="logo">Naboka<span>DEX</span></div>
    <button class="connect-btn" id="connectBtn" onclick="connectWallet()">

    </div>

          ≈ <span class="amount" id="quoteOut">0</span> <span id="quoteSymbol">XLM</span>
        </div>
      </div>

      <div class="field">
        <label>Мин. получить (slippage)</label>
        <input type="number" id="swapMinOut" placeholder="0" min="0" step="any" />
      </div>

      <button class="action-btn" onclick="doSwap()" id="swapBtn" disabled>Swap</button>
    </div>
  </div>

  <div class="panel" id="panel-liquidity">

      <div class="card-title">Управление ликвидностью</div>

        <label>Сумма NT</label>

  </div>

  <div class="log-area">

    <div id="log"></div>

<script nonce="EDNnf03ncetyOfn39fn3e9h3sdfa">

  const CONFIG = {

    network: 'testnet',
    networkPassphrase: 'Test SDF Network ; September 2015',
    rpcUrl: 'https://soroban-testnet.stellar.org',


    tokenA:  'CCUKGB4V3AMB46QANFUXKYEIIOAD2QLVCSIZ5D67ZHJFEDQD3GKUTOWP', // NabokaToken
    tokenB:  'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC', // Native XLM (SAC)
    lpToken: 'CDKPV7N35LUAQMELLEZX3LHUSW3MCBOCLEZIOG3HIQASAJJ5HFTO4LHA', // LP Token
    pool:    'CCGHUJ4Y67X2WK5SEGVWBX47WFFAWGHEI6LMLX5RJYF35GYVJ7DKDXH4', // Liquidity Pool


    decimalsA: 7,
    decimalsB: 7,
    decimalsLP: 7,
  };

  let userAddress = null;
  let server = null;

  function init() {
    server = new StellarSdk.SorobanRpc.Server(CONFIG.rpcUrl);
    setupTabs();

    if (window.freighterApi) {
      log('info', 'Приложение загружено. Подключите кошелёк Freighter.');
    } else {
      window.addEventListener('freighter-ready', () => {
        log('info', 'Freighter API загружен. Подключите кошелёк.');
      });
      log('info', 'Загрузка Freighter API…');
    }
  }

  async function connectWallet() {
    try {
      if (!window.freighterApi) {
        log('error', 'Freighter не найден');
        return;
      }

      const freighter = window.freighterApi;
      await freighter.requestAccess();

      const result = await freighter.getAddress();
      const address = typeof result === 'string' ? result : result.address;

      if (!address) {
        log('error', 'Не удалось получить адрес');
        return;
      }

      userAddress = address;

      const short = address.slice(0, 6) + '…' + address.slice(-4);

      document.getElementById('connectBtn').textContent = short;
      document.getElementById('connectBtn').classList.add('connected');
      document.getElementById('swapBtn').disabled = false;

      log('success', `Кошелёк подключён: ${short}`);

      await refreshBalances();

    } catch (err) {
      log('error', `Ошибка подключения: ${err.message || err}`);
    }
  }

  function toUnits(raw, decimals) {
    if (raw == null) return '—';
    const num = Number(raw) / Math.pow(10, decimals);
    return num.toLocaleString('ru-RU', { maximumFractionDigits: decimals });
  }

  async function callContract(contractId, method, args = []) {
    const contract = new StellarSdk.Contract(contractId);
    const account = await server.getAccount(userAddress);
    const tx = new StellarSdk.TransactionBuilder(account, {
      fee: '100',
      networkPassphrase: CONFIG.networkPassphrase,
    })
            .addOperation(contract.call(method, ...args))
            .setTimeout(30)
            .build();

    const sim = await server.simulateTransaction(tx);
    if (StellarSdk.SorobanRpc.Api.isSimulationError(sim)) {
      throw new Error(sim.error || 'simulation failed');
    }
    return sim.result?.retval;
  }

  async function refreshBalances() {
    if (!userAddress) return;
    try {
      const addr = new StellarSdk.Address(userAddress);
      const addrScVal = addr.toScVal();

      const balA = await callContract(CONFIG.tokenA, 'balance', [addrScVal]);
      document.getElementById('balanceA').textContent =
              toUnits(StellarSdk.scValToNative(balA), CONFIG.decimalsA);

      try {
        const balB = await callContract(CONFIG.tokenB, 'balance', [addrScVal]);
        document.getElementById('balanceB').textContent =
                toUnits(StellarSdk.scValToNative(balB), CONFIG.decimalsB);
      } catch {
        const acct = await server.getAccount(userAddress);
        const native = acct.balances?.find(b => b.asset_type === 'native');
        document.getElementById('balanceB').textContent = native ? Number(native.balance).toFixed(2) : '—';
      }

      const balLP = await callContract(CONFIG.lpToken, 'balance', [addrScVal]);
      document.getElementById('balanceLP').textContent =
              toUnits(StellarSdk.scValToNative(balLP), CONFIG.decimalsLP);

      const reserves = await callContract(CONFIG.pool, 'get_reserves', []);
      if (reserves) {
        const [rA, rB] = StellarSdk.scValToNative(reserves);
        document.getElementById('reserves').textContent =
                `${toUnits(rA, CONFIG.decimalsA)} / ${toUnits(rB, CONFIG.decimalsB)}`;
      }

      const swaps = await callContract(CONFIG.pool, 'total_swaps', []);
      document.getElementById('totalSwaps').textContent =
              swaps != null ? StellarSdk.scValToNative(swaps) : '—';
    } catch (err) {
      log('error', `Не удалось обновить балансы: ${err.message}`);
    }
  }

  async function signAndSend(contractId, method, args = []) {
    const contract = new StellarSdk.Contract(contractId);
    const account = await server.getAccount(userAddress);
    let tx = new StellarSdk.TransactionBuilder(account, {
      fee: '10000000',
      networkPassphrase: CONFIG.networkPassphrase,
    })
            .addOperation(contract.call(method, ...args))
            .setTimeout(60)
            .build();

    const sim = await server.simulateTransaction(tx);
    if (StellarSdk.SorobanRpc.Api.isSimulationError(sim)) {
      throw new Error(sim.error || 'Simulation failed');
    }
    tx = StellarSdk.SorobanRpc.assembleTransaction(tx, sim).build();

    const xdr = tx.toXDR();
    const xdrBase64 = typeof xdr === 'string'
            ? xdr
            : btoa(String.fromCharCode(...new Uint8Array(xdr)));

    const signResult = await window.freighterApi.signTransaction(xdrBase64, {
      networkPassphrase: CONFIG.networkPassphrase,
    });
    const signedXdr = typeof signResult === 'string'
            ? signResult
            : signResult.signedTxXdr;

    const sendRes = await fetch(CONFIG.rpcUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0', id: 1,
        method: 'sendTransaction',
        params: { transaction: signedXdr }
      })
    });
    const sendJson = await sendRes.json();
    console.log('sendTransaction result:', sendJson);

    if (sendJson.error) throw new Error(sendJson.error.message);
    if (sendJson.result?.status === 'ERROR') throw new Error('Submission failed');

    const hash = sendJson.result?.hash;

    const start = Date.now();
    while (Date.now() - start < 30000) {
      const pollRes = await fetch(CONFIG.rpcUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jsonrpc: '2.0', id: 1,
          method: 'getTransaction',
          params: { hash }
        })
      });
      const poll = await pollRes.json();
      if (poll.result?.status === 'SUCCESS') return poll.result;
      if (poll.result?.status === 'FAILED') throw new Error('Transaction failed on-chain');
      await new Promise(r => setTimeout(r, 2000));
    }
    throw new Error('Timeout');
  }

  function toAmount(val, decimals) {
    return BigInt(Math.round(parseFloat(val) * Math.pow(10, decimals)));
  }

  function i128ScVal(val) {
    return StellarSdk.nativeToScVal(val, { type: 'i128' });
  }


  async function updateQuote() {
    const amountRaw = document.getElementById('swapAmountIn').value;
    if (!amountRaw || parseFloat(amountRaw) <= 0 || !userAddress) {
      document.getElementById('quoteOut').textContent = '0';
      return;
    }
    const dir = document.getElementById('swapFrom').value;
    const decIn  = dir === 'A' ? CONFIG.decimalsA : CONFIG.decimalsB;
    const decOut = dir === 'A' ? CONFIG.decimalsB : CONFIG.decimalsA;
    const method = dir === 'A' ? 'quote_a_to_b' : 'quote_b_to_a';

    try {
      const amt = toAmount(amountRaw, decIn);
      const result = await callContract(CONFIG.pool, method, [i128ScVal(amt)]);
      const out = StellarSdk.scValToNative(result);
      document.getElementById('quoteOut').textContent = toUnits(out, decOut);
    } catch {
      document.getElementById('quoteOut').textContent = '?';
    }
    document.getElementById('quoteSymbol').textContent = dir === 'A' ? 'XLM' : 'NT';
  }

  function flipSwap() {
    const sel = document.getElementById('swapFrom');
    sel.value = sel.value === 'A' ? 'B' : 'A';
    updateQuote();
  }

  async function doSwap() {
    if (!userAddress) return;
    const dir = document.getElementById('swapFrom').value;
    const amountRaw = document.getElementById('swapAmountIn').value;
    const minOutRaw = document.getElementById('swapMinOut').value || '0';
    if (!amountRaw || parseFloat(amountRaw) <= 0) return;

    const decIn  = dir === 'A' ? CONFIG.decimalsA : CONFIG.decimalsB;
    const decOut = dir === 'A' ? CONFIG.decimalsB : CONFIG.decimalsA;
    const method = dir === 'A' ? 'swap_a_to_b' : 'swap_b_to_a';
    const tokenIn = dir === 'A' ? CONFIG.tokenA : CONFIG.tokenB;
    const amt    = toAmount(amountRaw, decIn);
    const minOut = toAmount(minOutRaw, decOut);
    const addr   = new StellarSdk.Address(userAddress).toScVal();
    const poolAddr = new StellarSdk.Address(CONFIG.pool).toScVal();

    try {
      log('info', 'Approve для свопа…');
      await signAndSend(tokenIn, 'approve', [
        addr, poolAddr, i128ScVal(amt),
        StellarSdk.nativeToScVal(3100000, { type: 'u32' })
      ]);

      log('info', `Swap: отдаём ${amountRaw} ${dir === 'A' ? 'NT' : 'XLM'}…`);        await signAndSend(CONFIG.pool, method, [addr, i128ScVal(amt), i128ScVal(minOut)]);
      log('success', 'Swap выполнен!');
      await refreshBalances();
    } catch (err) {
      log('error', `Swap ошибка: ${err.message}`);
    }
  }

  async function getExpirationLedger() {
    const latestLedger = await server.getLatestLedger();
    return latestLedger.sequence + 500000;
  }
  async function addLiquidity() {
    if (!userAddress) return;
    const aRaw = document.getElementById('liqAmountA').value;
    const bRaw = document.getElementById('liqAmountB').value;
    if (!aRaw || !bRaw || parseFloat(aRaw) <= 0 || parseFloat(bRaw) <= 0) return;

    const amtA = toAmount(aRaw, CONFIG.decimalsA);
    const amtB = toAmount(bRaw, CONFIG.decimalsB);
    const addr = new StellarSdk.Address(userAddress).toScVal();
    const poolAddr = new StellarSdk.Address(CONFIG.pool).toScVal();
    const expLedger = await getExpirationLedger();

    try {
      log('info', 'Approve NT для пула…');
      await signAndSend(CONFIG.tokenA, 'approve', [
        addr, poolAddr, i128ScVal(amtA),
        StellarSdk.nativeToScVal(expLedger, { type: 'u32' })
      ]);

      log('info', 'Approve XLM для пула…');
      await signAndSend(CONFIG.tokenB, 'approve', [
        addr, poolAddr, i128ScVal(amtB),
        StellarSdk.nativeToScVal(expLedger, { type: 'u32' })
      ]);

      log('info', `Добавляем ликвидность: ${aRaw} NT + ${bRaw} XLM…`);
      await signAndSend(CONFIG.pool, 'add_liquidity', [
        addr, i128ScVal(amtA), i128ScVal(amtB)
      ]);
      log('success', 'Ликвидность добавлена!');
      await refreshBalances();
    } catch (err) {
      log('error', `Ошибка: ${err.message}`);
    }
  }

  async function removeLiquidity() {
    if (!userAddress) return;
    const lpRaw = document.getElementById('removeLpAmount').value;
    if (!lpRaw || parseFloat(lpRaw) <= 0) return;

    const lpAmt = toAmount(lpRaw, CONFIG.decimalsLP);
    const addr  = new StellarSdk.Address(userAddress).toScVal();

    try {
      log('info', `Выводим ${lpRaw} LP-токенов…`);
      await signAndSend(CONFIG.pool, 'remove_liquidity', [addr, i128ScVal(lpAmt)]);
      log('success', 'Ликвидность выведена!');
      await refreshBalances();
    } catch (err) {
      log('error', `Ошибка: ${err.message}`);
    }
  }

  async function doTransfer() {
    if (!userAddress) return;
    const to     = document.getElementById('transferTo').value.trim();
    const amtRaw = document.getElementById('transferAmount').value;
    if (!to || !amtRaw || parseFloat(amtRaw) <= 0) return;

    const from  = new StellarSdk.Address(userAddress).toScVal();
    const toVal = new StellarSdk.Address(to).toScVal();
    const amt   = toAmount(amtRaw, CONFIG.decimalsA);

    try {
      log('info', `Перевод ${amtRaw} NT → ${to.slice(0,8)}…`);
      await signAndSend(CONFIG.tokenA, 'transfer', [from, toVal, i128ScVal(amt)]);
      log('success', 'Перевод выполнен!');
      await refreshBalances();
    } catch (err) {
      log('error', `Перевод ошибка: ${err.message}`);
    }
  }


  function setupTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });
  }

  function log(type, msg) {
    const el = document.getElementById('log');
    const ts = new Date().toLocaleTimeString('ru-RU');
    el.innerHTML += `<div class="${type}">[${ts}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }

  window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
